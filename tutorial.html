<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>烘焙團購教學文章</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
	/* 基礎 */
	body{
	    margin:0;
	    font-family:"Noto Sans TC", Arial;
	    background:#fafafa;
	    color:#333;
	}

	/* header */
	.blog-header{
	    text-align:center;
	    padding:60px 20px;
	    background:linear-gradient(135deg,#fff7ed,#ffffff);
	}

	.blog-header h1{
	    font-size:36px;
	    margin-bottom:10px;
	}

	.blog-header p{
	    color:#666;
	}

	/* container */
	.blog-container{
	    max-width:1000px;
	    margin:40px auto;
	    padding:0 20px;

	    display:grid;
	    grid-template-columns:repeat(2,1fr);
	    gap:20px;
	}

	/* card */
	.blog-card{
	    display:block;
	    background:#fff;
	    padding:25px;
	    border-radius:15px;
	    text-decoration:none;
	    color:#333;
	    box-shadow:0 5px 15px rgba(0,0,0,0.08);
	    transition:.2s;
	}

	.blog-card:hover{
	    transform:translateY(-5px);
	    box-shadow:0 10px 25px rgba(0,0,0,0.12);
	}

	.blog-card h2{
	    font-size:20px;
	    margin-bottom:10px;
	}

	.blog-card p{
	    color:#666;
	    line-height:1.6;
	    margin-bottom:15px;
	}

	.blog-card span{
	    color:#e28a30;
	    font-weight:bold;
	}

	/* footer */
	.blog-footer{
	    text-align:center;
	    padding:40px;
	    color:#888;
	}

	/* RWD */
	@media(max-width:768px){
	    .blog-container{
	        grid-template-columns:1fr;
	    }

	    .blog-header h1{
	        font-size:28px;
	    }
	}
</style>
</head>

<body>

<header class="blog-header">
    <h1>LINE團購教學文章</h1>
    <p>分享 LINE 團購、甜點經營與訂單管理技巧</p>
</header>

<section class="blog-container">

    <!-- card -->
    <a class="blog-card" href="#">
        <h2>如何用 LINE 做烘焙團購</h2>
        <p>學會如何用 LINE 建立團購流程，從商品建立到訂單整理一次搞懂。</p>
        <span>閱讀更多 →</span>
    </a>


    <a class="blog-card" href="#">
        <h2>如何管理多口味商品價格</h2>
        <p>學會如何設定不同口味價格，避免混亂並提升管理效率。</p>
        <span>閱讀更多 →</span>
    </a>


    <a class="blog-card" href="#">
        <h2>如何減少團購訂單錯誤</h2>
        <p>透過系統化下單流程降低人工錯誤，提高訂單準確率。</p>
        <span>閱讀更多 →</span>
    </a>


    <a class="blog-card" href="#">
        <h2>如何提升甜點工作室營收</h2>
        <p>從回購率、客單價到團購策略，全面提升營收的方法。</p>
        <span>閱讀更多 →</span>
    </a>

</section>


<footer class="blog-footer">
    © 2026 烘焙團購系統
</footer>

</body>
</html>
