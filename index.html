<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>烘焙團購管理系統</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: "Noto Sans TC", sans-serif;
    background:#fafafa;
    color:#333;
}

/* header */

.header {
    height:70px;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
    box-shadow:0 2px 8px #ddd;
}

.logo {
    font-size:24px;
    font-weight:bold;
}

.menu a {
    margin-left:20px;
    text-decoration:none;
    color:#555;
}

/* hero */

.hero {
    min-height:500px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:
    linear-gradient(
        rgba(255,255,255,.8),
        rgba(255,255,255,.8)
    ),
    url("https://www.haolongbin9.site/logo.png");
    background-size:cover;
}

.hero h1 {
    font-size:48px;
    margin-bottom:20px;

}

.hero p {
    font-size:20px;
    color:#666;
}

.btn {
    margin-top:30px;
    background:#ff8c42;
    color:white;
    padding:14px 35px;
    border-radius:30px;
    text-decoration:none;
}

/* feature */

.features {
    padding:60px 40px;
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card {
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 3px 15px #ddd;
}

.card h3 {
    margin-top:0;
}


.icon {
    font-size:40px;
}

/* footer */

.footer {
    text-align:center;
    padding:30px;
    color:#777;
}
</style>
</head>
<body>
    <header class="header">
        <div class="logo">
            🍞 Bake Order
        </div>
        <div class="menu">
            <a href="#">首頁</a>
            <a href="#">功能</a>
            <a href="#">教學</a>
            <a href="#">Demo</a>
        </div>
    </header>
    <section class="hero">
        <h1>讓烘焙團購更簡單</h1>
        <p>LINE 下單、訂單管理、銷售分析，一套完成</p>
        <a class="btn" href="#">立即體驗</a>
    </section>
    <section class="features">
        <div class="card">
            <div class="icon">🛒</div>
            <h3>LINE 快速下單</h3>
            <p>透過 LINE Bot 與購物車，讓客戶輕鬆完成訂購。</p>
        </div>

        <div class="card">
            <div class="icon">📦</div>
            <h3>團購管理</h3>
            <p>集中管理商品、訂單與取貨資訊。</p>
        </div>
        <div class="card">
            <div class="icon">📊</div>
            <h3>銷售分析</h3>
            <p>查看熱門商品與歷史訂購紀錄。</p>
        </div>
        <div class="card">
            <div class="icon">⚙️</div>
            <h3>自動化流程</h3>
            <p>減少人工整理 Excel 的時間。</p>

        </div>
    </section>
    <footer class="footer">© 2026 Bake Order</footer>
</body>
</html>
