<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LINE團購管理系統</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Noto Sans TC", Arial, sans-serif;
    background: #fafafa;
    color: #333;
}

footer{
    position:relative;
    bottom:0;
    width:100%;
}

.header {
    min-height: 70px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 40px;
    box-shadow: 0 2px 10px #ddd;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.menu {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* 一般選單 */
.menu-item {
    padding: 8px 14px;
    border-radius: 20px;
    text-decoration: none;
    color: #555;
    font-size: 14px;
    transition: 0.2s;
}

/* hover */
.menu-item:hover {
    background: #f3f3f3;
    transform: translateY(-1px);
}

/* active */
.menu-item.active {
    background: #ff8c42;
    color: white;
}

/* CTA 按鈕 */
.menu-cta {
    margin-left: 10px;
    padding: 8px 16px;
    border-radius: 20px;
    background: #111;
    color: white;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
}

.menu-cta:hover {
    background: #333;
    transform: scale(1.05);
}

.hero {
    min-height: 520px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 40px 20px;
    background:
    linear-gradient(
        rgba(255,255,255,.85),
        rgba(255,255,255,.85)
    ),
    url("https://images.unsplash.com/photo-1509440159596-0249088772ff");
    background-size: cover;
    background-position: center;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

.hero p {
    font-size: 20px;
    color: #666;
}

.btn {
    margin-top: 30px;
    background: #ff8c42;
    color: white;
    padding: 15px 45px;
    border-radius: 30px;
    text-decoration: none;
}

.features {
    padding: 60px 30px;
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 25px;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 18px;
}

.icon {
    font-size: 42px;
}

.footer {
    padding: 30px;
    text-align: center;
    color: #777;
}

@media(max-width:900px) {
    .header {
        flex-direction: column;
        gap: 15px;
    }

    .features {
        grid-template-columns: repeat(2,1fr);
    }
}

@media(max-width:600px) {
    .menu {
        flex-wrap: wrap;
        justify-content: center;
    }

    .hero h1 {
        font-size: 30px;
    }

    .features {
        grid-template-columns: 1fr;
    }

    .btn {
        width: 90%;
    }

    .menu-item, .menu-cta {
        font-size: 13px;
    }
}

footer{
    background:#111;
    color:#fff;
    text-align:center;
    padding:25px 15px;
    margin-top:30px;
}

footer a{
    color:#ccc;
    text-decoration:none;
    margin:0 10px;
    font-size:14px;
    transition:0.2s;
}

footer a:hover{
    color:#fff;
}

footer .links{
    margin-bottom:10px;
}

footer .copy{
    font-size:12px;
    color:#888;
    margin-top:10px;
}

/* 分隔線感 */
footer .divider{
    width:60%;
    height:1px;
    background:#333;
    margin:10px auto;
}

/* RWD */
@media(max-width:600px){
    footer a{
        display:block;
        margin:6px 0;
    }
}
</style>
</head>

<body>

<header class="header">
    <nav class="menu">
        <a href="#" class="menu-item active">首頁</a>
        <a href="#feature" class="menu-item">功能</a>
        <a href="tutorial.html" class="menu-item">教學</a>
        <a href="demo.html" class="menu-item">Demo</a>
    </nav>
</header>

<section class="hero">
    <h1>LINE團購管理系統</h1>

    <p>
        LINE 下單<br>
        自動整理訂單<br>
        快速掌握銷售狀況
    </p>

    <a class="btn" href="demo.html">
        立即體驗
    </a>
</section>

<section class="features" id="feature">

    <div class="card">
        <div class="icon">🛒</div>
        <h3>LINE 下單</h3>
        <p>客戶直接透過 LINE 完成訂購。</p>
    </div>

    <div class="card">
        <div class="icon">📦</div>
        <h3>團購管理</h3>
        <p>商品、訂單集中管理。</p>
    </div>

    <div class="card">
        <div class="icon">📊</div>
        <h3>數據分析</h3>
        <p>查看熱門商品與銷售趨勢。</p>
    </div>

    <div class="card">
        <div class="icon">⚙️</div>
        <h3>自動化</h3>
        <p>降低人工整理時間。</p>
    </div>

</section>

<footer>
<div class="links">
    <a href="privacy.html">隱私權政策</a>
    <a href="terms.html">使用條款</a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSc6v2_zFrx7NL5xx3sdTuagKRvpy5qWGw75RctKX79Rpvisow/viewform?usp=publish-editor" target="_blank">聯絡我們</a>
</div>
<div class="divider"></div>
<div class="copy">
    © 2026 LINE團購管理系統<br>Developed by Chien Rong
</div>
</footer>

</body>
</html>
