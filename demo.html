<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>烘焙系統 Demo</title>

<style>

body {
    margin:0;
    font-family:"Noto Sans TC", sans-serif;
    background:#f6f6f6;
    color:#333;
}

/* header */
.header {
    background:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px #ddd;
}

.badge {
    background:#ff8c42;
    color:white;
    padding:4px 10px;
    border-radius:12px;
    font-size:12px;
}

/* tabs */
.tabs {
    display:flex;
    background:white;
    padding:10px;
    gap:10px;
    box-shadow:0 2px 6px #eee;
}

.tab {
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    background:#eee;
    font-size:14px;
}

.tab.active {
    background:#111;
    color:white;
}

/* container */
.container {
    padding:15px;
}

/* card */
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    box-shadow:0 2px 6px #eee;
}

/* input */
input, button, select {
    padding:8px;
    margin:5px 0;
}

button {
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn {
    background:#111;
    color:white;
}

.btn-orange {
    background:#ff8c42;
    color:white;
}

.item {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

</style>

</head>

<body>

<div class="header">
    <div>🍞 烘焙系統 Demo</div>
    <div class="badge">Sandbox Mode</div>
</div>

<!-- tabs -->
<div class="tabs">
    <div class="tab active" onclick="switchTab('admin')">⚙️ 管理者</div>
    <div class="tab" onclick="switchTab('user')">🛒 下單</div>
</div>

<div class="container">

<!-- ADMIN -->
<div id="adminPage">

    <div class="card">
        <h3>新增團購</h3>

        <input id="prdName" placeholder="商品名稱">
        <input id="prdPrice" placeholder="價格">

        <button class="btn-orange" onclick="addProduct()">
            新增
        </button>
    </div>

    <div class="card">
        <h3>商品列表</h3>
        <div id="productList"></div>
    </div>

</div>

<!-- USER -->
<div id="userPage" style="display:none;">

    <div class="card">
        <h3>模擬下單</h3>

        <select id="selectProduct"></select>
        <input id="qty" type="number" value="1">

        <button class="btn" onclick="addOrder()">
            加入購物車
        </button>
    </div>

    <div class="card">
        <h3>購物車</h3>
        <div id="cartList"></div>

        <button class="btn-orange" onclick="checkout()">
            模擬結帳
        </button>
    </div>

</div>

</div>

<script>

/* ===== MOCK DB (記憶體) ===== */
let products = [
    { name:"奶油餐包", price:50 },
    { name:"可可蛋糕", price:80 }
];

let cart = [];

/* ===== INIT ===== */
renderProducts();
renderSelect();

/* ===== TAB ===== */
function switchTab(tab){

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

    if(tab === "admin"){
        document.getElementById("adminPage").style.display = "block";
        document.getElementById("userPage").style.display = "none";
        document.querySelectorAll(".tab")[0].classList.add("active");
    }

    if(tab === "user"){
        document.getElementById("adminPage").style.display = "none";
        document.getElementById("userPage").style.display = "block";
        document.querySelectorAll(".tab")[1].classList.add("active");
    }

}

/* ===== ADMIN ===== */
function addProduct(){

    const name = document.getElementById("prdName").value;
    const price = document.getElementById("prdPrice").value;

    if(!name || !price) return;

    products.push({name, price});

    renderProducts();
    renderSelect();

}

function renderProducts(){

    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="item">
            <div>${p.name}</div>
            <div>$${p.price}</div>
        </div>`;
    });

    document.getElementById("productList").innerHTML = html;

}

/* ===== USER ===== */
function renderSelect(){

    let select = document.getElementById("selectProduct");

    select.innerHTML = "";

    products.forEach((p,i)=>{
        select.innerHTML += `<option value="${i}">${p.name}</option>`;
    });

}

function addOrder(){

    const idx = document.getElementById("selectProduct").value;
    const qty = parseInt(document.getElementById("qty").value);

    const p = products[idx];

    cart.push({
        name: p.name,
        qty,
        total: p.price * qty
    });

    renderCart();

}

function renderCart(){

    let html = "";

    cart.forEach(c=>{
        html += `
        <div class="item">
            <div>${c.name} x ${c.qty}</div>
            <div>$${c.total}</div>
        </div>`;
    });

    document.getElementById("cartList").innerHTML = html;

}

function checkout(){

    alert("Demo 結帳成功（未寫入系統）");

    cart = [];

    renderCart();

}

</script>

</body>
</html>
