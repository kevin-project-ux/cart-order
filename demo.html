<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>烘焙系統 Demo</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:"Noto Sans TC",sans-serif;
    background:#f6f6f6;
    color:#333;
}
.header{
    background:white;
    padding:15px 20px 15px 70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px #ddd;
}
.badge{
    background:#ff8c42;
    color:white;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}
.float-back{
    position:fixed;
    top:15px;
    left:15px;
    width:42px;
    height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#111;
    color:white;
    border-radius:50%;
    text-decoration:none;
    z-index:999;
}
.tabs{
    background:white;
    display:flex;
    gap:10px;
    padding:10px;
    box-shadow:0 2px 6px #eee;
}
.tab{
    background:#eee;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}
.tab.active{
    background:#111;
    color:white;
}
.container{
    padding:15px;
}
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 8px #eee;
}
input,select{
    width:100%;
    padding:8px;
    margin:7px 0;
}
button{
    border:0;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
}
.btn{
    background:#111;
    color:white;
}
.btn-orange{
    background:#ff8c42;
    color:white;
}
.btn-red{
    background:#e74c3c;
    color:white;
}
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #eee;
}
.small{
    color:#888;
    font-size:13px;
}
@media(max-width:600px){
    .header{
        flex-direction:column;
        gap:10px;
    }
    .tabs{
        flex-wrap:wrap;
    }
}
</style>
</head>

<body>

<a class="float-back" href="index.html">
<i class="fa-solid fa-arrow-left"></i>
</a>

<div class="header">
<div>🍞 烘焙系統 Demo</div>
<div class="badge">Sandbox Mode</div>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('admin')">⚙️ 管理</div>
<div class="tab" onclick="switchTab('user')">🛒 下單</div>
<div class="tab" onclick="switchTab('order')">📦 訂單紀錄</div>
</div>

<div class="container">

<div id="adminPage">

<div class="card">
<h3>新增團購</h3>

<input id="prdName" placeholder="商品名稱">
<input id="prdPrice" placeholder="價格">

<button class="btn-orange" onclick="addProduct()">
新增團購
</button>

</div>

<div class="card">
<h3>商品管理</h3>
<div id="productList"></div>
</div>

</div>


<div id="userPage" style="display:none;">

<div class="card">
<h3>🛒 商品下單</h3>

<select id="selectProduct"></select>

<input id="qty" type="number" value="1">

<button class="btn" onclick="addCart()">
加入購物車
</button>

</div>


<div class="card">
<h3>購物車</h3>

<div id="cartList"></div>

<button class="btn-orange" onclick="checkout()">
模擬結帳
</button>

</div>

</div>


<div id="orderPage" style="display:none;">

<div class="card">

<h3>📦 下單紀錄</h3>

<div id="orderList"></div>

</div>

</div>

</div>
<script>
let products=[
    {id:1,name:"奶油餐包",price:50,active:true},
    {id:2,name:"可可蛋糕",price:80,active:true}
];

let cart=[];
let orders=[];
let id=3;

renderAll();

function switchTab(type){
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));

    adminPage.style.display="none";
    userPage.style.display="none";
    orderPage.style.display="none";

    if(type==="admin"){
        adminPage.style.display="block";
    }

    if(type==="user"){
        userPage.style.display="block";
    }

    if(type==="order"){
        orderPage.style.display="block";
        renderOrders();
    }

    event.target.classList.add("active");
}

function addProduct(){
    let name=document.getElementById("prdName").value;
    let price=document.getElementById("prdPrice").value;

    if(!name||!price)return;

    products.push({
        id:id++,
        name:name,
        price:Number(price),
        active:true
    });

    document.getElementById("prdName").value="";
    document.getElementById("prdPrice").value="";

    renderAll();
}

function renderProducts(){
    let html="";

    products.forEach(p=>{
        html+=`
        <div class="item">
            <div>
                <b>${p.name}</b>
                <div class="small">
                    ${p.active?"🟢 開放中":"🔴 已停用"}
                </div>
            </div>

            <div>
                <button class="btn" onclick="toggleProduct(${p.id})">
                    ${p.active?"停用":"啟用"}
                </button>

                <button class="btn-red" onclick="deleteProduct(${p.id})">
                    刪除
                </button>
            </div>
        </div>`;
    });

    document.getElementById("productList").innerHTML=html;
}

function toggleProduct(id){
    let p=products.find(x=>x.id==id);

    if(p){
        p.active=!p.active;
    }

    renderAll();
}

function deleteProduct(id){

    Swal.fire({
        title:"刪除團購？",
        text:"刪除後 Demo 商品會消失",
        icon:"warning",
        showCancelButton:true,
        confirmButtonText:"刪除",
        cancelButtonText:"取消"
    }).then(result=>{

        if(result.isConfirmed){

            products=products.filter(x=>x.id!=id);

            renderAll();

            Swal.fire({
                icon:"success",
                title:"已刪除",
                timer:1000,
                showConfirmButton:false
            });
        }
    });
}

function renderSelect(){

    let select=document.getElementById("selectProduct");

    select.innerHTML="";

    products.filter(x=>x.active).forEach(p=>{

        select.innerHTML+=`
        <option value="${p.id}">
            ${p.name}
        </option>`;

    });
}

function addCart(){

    let id=document.getElementById("selectProduct").value;

    let qty=parseInt(
        document.getElementById("qty").value
    );

    let product=products.find(x=>x.id==id);

    if(!product)return;

    cart.push({
        name:product.name,
        qty:qty,
        total:product.price*qty
    });

    renderCart();

}

function renderCart(){

    let html="";

    cart.forEach(item=>{

        html+=`
        <div class="item">
            <div>
                ${item.name} x ${item.qty}
            </div>

            <b>
                $${item.total}
            </b>
        </div>`;

    });

    document.getElementById("cartList").innerHTML=
        html||"<div class='small'>購物車空白</div>";
}

function checkout(){

    if(cart.length===0){

        Swal.fire({
            icon:"warning",
            title:"購物車是空的"
        });

        return;
    }

    let order={
        time:new Date().toLocaleString(),
        items:[...cart],
        total:cart.reduce((sum,item)=>sum+item.total,0)
    };

    orders.push(order);

    cart=[];

    renderCart();
    renderOrders();

    Swal.fire({
        icon:"success",
        title:"模擬結帳成功",
        text:"請到訂單紀錄查看!!"
    });
}

function renderOrders(){

    let html="";

    orders.forEach((order,index)=>{

        html+=`
        <div class="card">

            <div>
                <b>訂單 ${index+1}</b>
            </div>

            <div class="small">
                ${order.time}
            </div>

            <hr>

            ${
                order.items.map(item=>`
                <div class="item">
                    <span>
                        ${item.name} x ${item.qty}
                    </span>
                    <b>
                        $${item.total}
                    </b>
                </div>
                `).join("")
            }

            <br>

            <b>
                總金額：$${order.total}
            </b>

        </div>`;

    });

    document.getElementById("orderList").innerHTML=
        html||"<div class='small'>尚無訂單</div>";
}

function renderAll(){
    renderProducts();
    renderSelect();
    renderCart();
    renderOrders();
}
</script>

</body>
</html>
