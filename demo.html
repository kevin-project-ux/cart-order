<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>烘焙系統 Demo</title>

<style>

body {
    margin:0;
    font-family:"Noto Sans TC", sans-serif;
    background:#f6f6f6;
    color:#333;
}

/* header */
.header {
    background:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px #ddd;
}

.badge {
    background:#ff8c42;
    color:white;
    padding:4px 10px;
    border-radius:12px;
    font-size:12px;
}

/* tabs */
.tabs {
    display:flex;
    gap:10px;
    padding:10px;
    background:white;
    box-shadow:0 2px 5px #eee;
    flex-wrap:wrap;
}

.tab {
    padding:8px 14px;
    border-radius:20px;
    background:#eee;
    cursor:pointer;
    font-size:14px;
}

.tab.active {
    background:#111;
    color:white;
}

/* container */
.container {
    padding:15px;
}

/* card */
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    box-shadow:0 2px 6px #eee;
}

/* input */
input, select {
    padding:8px;
    margin:5px 0;
    width:100%;
}

/* button */
button {
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    margin-top:5px;
}

.btn {
    background:#111;
    color:white;
}

.btn-orange {
    background:#ff8c42;
    color:white;
}

.btn-red {
    background:#e74c3c;
    color:white;
}

/* item */
.item {
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #eee;
}

.small {
    font-size:12px;
    color:#888;
}

</style>

</head>

<body>

<div class="header">
    <div>🍞 烘焙系統 Demo</div>
    <div class="badge">Sandbox Mode</div>
</div>

<!-- tabs -->
<div class="tabs">
    <div class="tab active" onclick="switchTab('admin')">⚙️ 管理者</div>
    <div class="tab" onclick="switchTab('user')">🛒 下單</div>
    <div class="tab" onclick="switchTab('manage')">🧾 維護</div>
</div>

<div class="container">

<!-- ================= ADMIN ================= -->
<div id="adminPage">

    <div class="card">
        <h3>新增團購商品</h3>

        <input id="prdName" placeholder="商品名稱">
        <input id="prdPrice" placeholder="價格">

        <button class="btn-orange" onclick="addProduct()">新增</button>
    </div>

    <div class="card">
        <h3>商品列表</h3>
        <div id="productList"></div>
    </div>

</div>

<!-- ================= USER ================= -->
<div id="userPage" style="display:none;">

    <div class="card">
        <h3>模擬下單</h3>

        <select id="selectProduct"></select>
        <input id="qty" type="number" value="1">

        <button class="btn" onclick="addOrder()">加入購物車</button>
    </div>

    <div class="card">
        <h3>購物車</h3>
        <div id="cartList"></div>

        <button class="btn-orange" onclick="checkout()">模擬結帳</button>
    </div>

</div>

<!-- ================= MANAGE ================= -->
<div id="managePage" style="display:none;">

    <div class="card">
        <h3>團購維護</h3>
        <div class="small">可刪除商品 / 結束團購（Demo）</div>
        <div id="manageList"></div>
    </div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>

/* ===== MOCK DATA ===== */
let products = [
    { id:1, name:"奶油餐包", price:50, active:true },
    { id:2, name:"可可蛋糕", price:80, active:true }
];

let cart = [];
let pid = 3;

/* ===== INIT ===== */
renderAll();

/* ===== TAB ===== */
function switchTab(tab){

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

    document.getElementById("adminPage").style.display = "none";
    document.getElementById("userPage").style.display = "none";
    document.getElementById("managePage").style.display = "none";

    if(tab === "admin"){
        document.getElementById("adminPage").style.display = "block";
    }

    if(tab === "user"){
        document.getElementById("userPage").style.display = "block";
    }

    if(tab === "manage"){
        document.getElementById("managePage").style.display = "block";
        renderManage();
    }

    event.target.classList.add("active");
}

/* ===== ADMIN ===== */
function addProduct(){

    const name = document.getElementById("prdName").value;
    const price = document.getElementById("prdPrice").value;

    if(!name || !price) return;

    products.push({
        id: pid++,
        name,
        price,
        active:true
    });

    renderAll();
}

function renderProducts(){

    let html = "";

    products.forEach(p=>{
        html += `
        <div class="item">
            <div>${p.name}</div>
            <div>$${p.price}</div>
        </div>`;
    });

    document.getElementById("productList").innerHTML = html;
}

/* ===== USER ===== */
function renderSelect(){

    let sel = document.getElementById("selectProduct");
    sel.innerHTML = "";

    products.filter(p=>p.active).forEach(p=>{
        sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });
}

function addOrder(){

    const id = document.getElementById("selectProduct").value;
    const qty = parseInt(document.getElementById("qty").value);

    const p = products.find(x=>x.id == id);

    cart.push({
        name:p.name,
        qty,
        total:p.price * qty
    });

    renderCart();
}

function renderCart(){

    let html = "";

    cart.forEach(c=>{
        html += `<div class="item">${c.name} x${c.qty} <b>$${c.total}</b></div>`;
    });

    document.getElementById("cartList").innerHTML = html;
}

function checkout(){

    // alert("模擬結帳成功（未寫入系統）");
    Swal.fire({
        icon: 'success',
        title: '結帳成功',
        text: '模擬結帳完成',
        confirmButtonText: '確定'
    });
    cart = [];
    renderCart();
}

/* ===== MANAGE ===== */
function renderManage(){

    let html = "";

    products.forEach(p=>{

        html += `
        <div class="item">
            <div>
                ${p.name}
                <div class="small">狀態：${p.active ? "進行中" : "已結束"}</div>
            </div>

            <div>
                <button class="btn" onclick="toggle(${p.id})">
                    ${p.active ? "結束" : "啟用"}
                </button>

                <button class="btn-red" onclick="removeProduct(${p.id})">
                    刪除
                </button>
            </div>
        </div>`;
    });

    document.getElementById("manageList").innerHTML = html;
}

function toggle(id){

    const p = products.find(x=>x.id==id);
    p.active = !p.active;

    renderAll();
}

function removeProduct(id){

    products = products.filter(x=>x.id!=id);

    renderAll();
}

/* ===== RENDER ALL ===== */
function renderAll(){
    renderProducts();
    renderSelect();
    renderManage();
}

</script>

</body>
</html>
