<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>配方/材料</title>

	<!-- Custom Style -->
    <link href="style.css" rel="stylesheet" />

    <!-- Bootstrap & Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Custom Js -->
    <script src="main.js"></script>
  
    <!-- DataTables + Bootstrap 5 -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  
    <!-- Vue 2 -->
	<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>
<style>
	#loadingMask {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .link-warning {
        color: #cc9900 !important; /* 深一點的黃 */
    }
</style>
<body data-page="formula">
	<div id="app">

		<div class="container mt-4">
        	<div class="card">
            	<div class="card-header d-flex justify-content-between align-items-center">
            		<h5 class="mb-0">品項列表</h5>
            		<a href="#" class="link-primary" @click="addFormulaModal()">
	                    <i class="fas fa-plus"></i> 新增
	                </a>
            	</div>
            	<div class="card-body">
            		<table id="example" class="table table-striped table-hover table-bordered w-100">
	                    <thead>
	                        <tr>
	                            <th>名稱</th>
	                            <th>價格</th>
	                            <th></th>
	                        </tr>
	                    </thead>
	                    <tbody id="tableBody"></tbody>
	                </table>
            	</div>
            </div>
        </div>

		<!-- 底部導覽載入位置 -->
		<div id="bottomNav"></div>

		<div id="loadingMask"><div class="spinner"></div></div>

		<!-- Formula Modal -->
		<div class="modal fade" id="addFormula" tabindex="-1">
	        <div class="modal-dialog modal-lg">
	            <div class="modal-content">
	                <div class="modal-header">
	                    <h5 class="modal-title" v-show="!editmode">新增配方</h5>
                        <h5 class="modal-title" v-show="editmode">維護配方</h5>
	                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
	                </div>
	                <div class="modal-body">
	                    <!-- Tabs -->
	                    <ul class="nav nav-tabs mb-3" id="Tabs" role="tablist">
	                        <li class="nav-item" role="presentation">
	                            <button class="nav-link active" id="formula-tab" data-bs-toggle="tab" data-bs-target="#formula" type="button" role="tab">配方內容</button>
	                        </li>
	                        <li class="nav-item" role="presentation" v-if="editmode">
	                            <button class="nav-link" id="material-tab" data-bs-toggle="tab" data-bs-target="#material" type="button" role="tab">材料內容</button>
	                        </li>
	                    </ul>
	          
	                    <!-- Tab Content -->
	                    <div class="tab-content" id="formulaTabsContent">
	                        <!-- 新增/維護配方 -->
	                        <div class="tab-pane fade show active" id="formula" role="tabpanel" aria-labelledby="formula-tab">
	                            <div class="p-4 bg-light rounded shadow-sm">
	                            	<form @submit.prevent="editmode ? updateFormula() : createFormula()">
		                                <div class="form-group mb-3">
			                                <label class="col-sm-3 col-form-label">配方名稱</label>
			                                <input v-model="formula_name" type="text" name="formula_name" class="form-control col-sm-8" placeholder="請輸出配方名稱">
			                            </div>
				                        <button v-show="editmode" type="submit" class="btn btn-success w-100">修改</button>
				                        <button v-show="!editmode" type="submit" class="btn btn-primary w-100">新增</button>
			                        </form>
	                            </div>
	                        </div>
	                    </div>

	                    <!-- Tab Content -->
	                    <div class="tab-content" id="materialTabsContent">
	                        <!-- 維護材料 -->
	                        <div class="tab-pane fade" id="material" role="tabpanel" aria-labelledby="material-tab">
	                            <div class="p-4 bg-light rounded shadow-sm">
	                            	<form @submit.prevent="updateMaterial()">
		                                <div class="form-group mb-3">
			                                <label class="col-sm-3 col-form-label">材料名稱</label>
			                                <input v-model="material_name" type="text" name="material_name" class="form-control col-sm-8" placeholder="請輸出材料名稱">
			                            </div>
			                            <div class="mb-3" id="materialType">
			                            	<!-- <button type="button" class="btn btn-secondary" v-for="material in materials">
											  	{{ material.name }}
											</button> -->
											<span class="badge rounded-pill" :class="material.active ? 'bg-danger':'bg-secondary'" v-for="(material, index) in materials" @click="setMaterial(material)" :key="index" style="font-size: 1rem;margin: 0.3rem;">
												{{ material.name }}
											</span>
			                            </div>
				                        <button v-show="editmode" type="submit" class="btn btn-success w-100">儲存</button>
			                        </form>
	                            </div>
	                        </div>
	                    </div>
	                </div>
	            </div>
	        </div>
	    </div>
	</div>
</body>
<script>
	const mask = document.getElementById('loadingMask');
</script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>

	var vm = new Vue({
		el: '#app',
		data: {
			editmode: false,
			msg: '',
			userId: 'test',
			formula_id: '',
			formula_name: '',
			material_name: '',
			formulas: { data: [] },
			materials: [],
		},
		methods: {

			addFormulaModal(){

				this.editmode = false;

				this.formula_name = '';

				$("#addFormula").modal('show');
			},

			updFormulaModal(e){

				console.log(e);

				this.editmode = true;

				$("#addFormula").modal('show');

				this.formula_id   = e.dataset.id;
				this.formula_name = e.dataset.name;
			},

			checkImgModal(){

			},

			loadFormulas() {

				// var ym = this.getLastMonth();
				// ⬇ 取得 users/test/202503_schedules
				db.ref("users/" + this.userId + "/formulas").on("value", (snapshot) => {
					const raw = snapshot.val();

					let events = [];

					if (raw) {

						let parsed = JSON.parse(raw);
						console.log(parsed);

						mask.style.display = 'flex';

						$('#example').DataTable({
			                data: parsed.data,
			                destroy: true, // 重新載入時清除舊表格
			                responsive: true,      // 如果你有使用 Bootstrap 等 RWD 框架
			                autoWidth: false,      // 關閉自動欄寬
			                pageLength: 5,           // 一頁顯示 5 筆
			                lengthChange: false,     // 不顯示筆數設定下拉選單
			                searching: false,
			                ordering: false, // 不啟用欄位排序
			                language: {
			                    paginate: { previous: '‹', next: '›' },
			                    zeroRecords: '目前沒有資料',
			                    url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/zh-HANT.json'
			                },
			                initComplete: function () {
			                    mask.style.display = 'none';
			                },
			                columns: [
			                    { data: 'name', className: 'truncate' },
			                    { 
			                        data: 'total_price',
			                        className: 'text-center',
			                        createdCell: function (td, cellData) {
			                        	if( cellData==0 ){
			                        		$(td).addClass('text-danger').text(cellData);
			                        	}else{
			                        		$(td).addClass('text-success').text(cellData);
			                        	}
			                        }
			                    },
			                    {
			                        data: null,
			                        defaultContent: '',
			                        className: 'text-center',
			                        render: function (data, type, row) {

			                        	// var enable = `<a href="#" class="dropdown-item link-secondary text-decoration-none" data-type="enable" onclick="enableFormula(this)"><i class="fas fa-edit"></i> 啟用配方</a>`;
			                        	var img  = `<a href="#" class="dropdown-item link-warning text-decoration-none" data-type="img" data-id="${row.id}" onclick="vm.checkImgModal(this)"><i class="fas fa-image"></i> 查看配方</a>`;
			                            var edit = `<a href="#" class="dropdown-item link-success text-decoration-none" data-type="edit" data-id="${row.id}" data-name="${row.name}" onclick="vm.updFormulaModal(this)"><i class="fas fa-edit"></i> 編輯配方</a>`;
			                            var del  = `<a href="#" class="dropdown-item link-danger text-decoration-none" data-type="delete" data-id="${row.id}" onclick="vm.delFormula(this)"><i class="far fa-trash-alt"></i> 刪除配方</a>`;
			                            // var view = `<a href="#" class="dropdown-item link-warning text-decoration-none" data-id="${row.ID}" data-name="${row.名稱}" data-flavor="${flavor}" data-type="view" onclick="updModal(this)"><i class="fas fa-eye"></i></a>`;
			                            // var upd = `<a href="#" class="dropdown-item link-purple text-decoration-none" data-id="${row.ID}" data-name="${row.名稱}" data-flavor="${flavor}" data-type="upd" onclick="updModal(this)"><i class="fas fa-list-alt"></i> 管理訂單</a>`;
			                            // <span class="badge bg-success">Beta</span>

			                            var html = `
			                                <div class="dropdown">
			                                    <a href="#" class="link-dark" role="button" data-bs-toggle="dropdown" aria-expanded="false">
			                                        <i class="fas fa-bars"></i>
			                                    </a>
			                                    <ul class="dropdown-menu dropdown-menu-end">
			                                        <li>${img}</li>
			                                        <li>${edit}</li>
			                                        <li>${del}</li>
			                                    </ul>
			                                </div>
			                            `;

			                            return html;
			                        }
			                    }
			                ]
			            });
					}
				});
			},

			loadMaterials(){

				var matstr = '高粉、中粉、低粉、鮮奶、蛋、蛋白、蛋黃、酵母、砂糖、鹽、奶油、糖、糖粉、奶粉、檸檬汁、香草莢、鮮奶油、二砂糖、可可粉、抹茶粉、純糖粉、玉米粉、太白粉、咖啡粉、紅茶粉、杏仁片、巧克力豆、泡打粉、夏威夷豆、碎核桃、棉花糖、蔓越莓乾、水、吉利丁片、蜂蜜、杏仁粉、煉乳、香草精、乳酪、OREO碎塊、榛果醬、沙拉油、蘭姆酒、檸檬皮屑、發酵奶油、無水奶油、鹹蛋黃、馬斯卡彭、冰水、醬油、黑糖、冰糖、八角、甘草、黃耆、葡萄乾、黑芝麻、白芝麻、起司粉、七味粉';
				var matarr = matstr.split('、');

				var tmpmats = [];
				matarr.forEach(function (val, i, arr) {
					tmpmats.push({ name:val, active: false });
				});
				this.materials = tmpmats;
				console.log(this.materials);
			},

			async getFirebaseData() {

				let formulas;

				const def = db.ref('users/' + this.userId + '/formulas');
				const data = await def.once("value");

				if (data.exists()) {
					formulas = JSON.parse(data.val());
					this.formulas = formulas;
				}
			},

			checkFormula(){

				var formula  = this.formulas.data.filter(data => data.name === this.formula_name);

				if ( formula.length>0 ) {
                    Swal.fire({ icon: 'error', title: '新增配方失敗，該配方已存在!!' });
                    return false;
                }

                return true;
			},

			createFormula(){

				var chkFormula = this.checkFormula();

				if ( chkFormula ) {

                    const def = db.ref('users/' + this.userId + '/formulas');

					var nextId = this.formulas.data.reduce((maxId, item) => Math.max(maxId, item.id || 0), 0) + 1;

					// {"data":[{"id":1,"name":"法國可可裸食燕麥","active":true,"total_weight":513,"total_size":513,"total_price":"92.04","image":"https://i.ibb.co/WvDKxsfB/8bb57377607e.png","expire_date":1745206769}]}

					var list = {
                        id: nextId,
                        name: this.formula_name,
                        active: false,
                        total_weight: 0,
                        total_size: 0,
                        total_price: 0,
                        image: "",
                        expire_date: "",
                    }

					this.formulas.data.push(list);
					def.set(JSON.stringify(this.formulas));

					Swal.fire({ icon: 'success', title: '新增成功', text: '請於配方列表中查看!' });

					$("#addFormula").modal('hide');
                }
			},

			updateFormula(){

				var chkFormula = this.checkFormula();

				if ( chkFormula ) {

                    const def = db.ref('users/' + this.userId + '/formulas');

                    var fid 	 = this.formula_id;
					var new_name = this.formula_name;
					var formulas = this.formulas;
					
					formulas.data.forEach(function (val, i, arr) {
						if (val.id == fid) {
							arr[i].name = new_name;
						}
					});

					def.set(JSON.stringify(formulas));

					Swal.fire({ icon: 'success', title: '更新成功', text: '請於配方列表中查看!' });

					$("#addFormula").modal('hide');
                }
			},

			delFormula(e){

				var id = e.dataset.id;

				Swal.fire({
		            title: text,
		            text: '此操作無法復原！',
		            icon: 'warning',
		            showCancelButton: true,
		            confirmButtonText: '確定',
		            cancelButtonText: '取消'
		        }).then((result) => {
		            if (result.isConfirmed) {

		                const def = db.ref('users/' + this.userId + '/formulas');

						var formulas = this.formulas;

						formulas.data = formulas.data.filter(item => item.id !== Number(id));

						def.set(JSON.stringify(formulas));
		            } else if (result.isDismissed) {
		                // 使用者按下「取消」或點旁邊關閉
		                console.log('使用者取消');
		            }
		        });
			},

			setMaterial(item){
				item.active = !item.active;
    			console.log(item.name);
			},

		},
		async mounted() {

			await liff.init({ liffId: '2007457926-5wAYNP0w' });

			if (!liff.isLoggedIn()) {
				liff.login();
				return;
			}

			this.profile = await liff.getProfile();
			this.userId  = this.profile.userId;

			this.loadFormulas();
			this.loadMaterials();

			await this.getFirebaseData();
		}
	});
</script>
</html>
