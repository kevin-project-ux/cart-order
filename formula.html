<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>配方/材料</title>

	<!-- Custom Style -->
	<link href="style.css" rel="stylesheet" />

	<!-- Bootstrap & Font Awesome -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<!-- jQuery -->
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

	<!-- Custom Js -->
	<script src="main.js"></script>

	<!-- DataTables + Bootstrap 5 -->
	<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

	<!-- Vue 2 -->
	<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>
<style>
	#loadingMask {
		position: fixed;
		top: 0;
		left: 0;
		width: 100vw;
		height: 100vh;
		background: rgba(0, 0, 0, 0.5);
		display: none;
		justify-content: center;
		align-items: center;
		z-index: 9999;
	}

	.link-warning {
		color: #cc9900 !important;
		/* 深一點的黃 */
	}

	.scroll-badges::-webkit-scrollbar {
		display: none;
		/* 隱藏scrollbar (手機更乾淨) */
	}

	.scroll-badges span {
		scroll-snap-align: start;
	}

	.badge-wrapper {
		position: relative;
		display: inline-block;
	}

	.badge {
		font-size: 1rem;
		/* padding: 0.4rem 1.2rem 0.4rem 0.8rem; */
		position: relative;
		overflow: visible;
		white-space: nowrap;
	}

	/* X 按鈕 */
	.remove-icon {
		position: absolute;
		top: -6px;
		right: -6px;
		font-size: 0.7rem;
		background: #fff;
		border-radius: 50%;
		padding: 2px 5px;
		cursor: pointer;
		color: #333;
		box-shadow: 0 0 3px rgba(0,0,0,0.4);
		z-index: 5;
	}
</style>

<body data-page="formula">
	<div id="app">

		<div class="container mt-4">
			<div class="card">
				<div class="card-header d-flex justify-content-between align-items-center">
					<h5 class="mb-0">品項列表</h5>
					<a href="#" class="link-primary" @click="addFormulaModal()">
						<i class="fas fa-plus"></i> 新增
					</a>
				</div>
				<div class="card-body">
					<table id="example" class="table table-striped table-hover table-bordered w-100">
						<thead>
							<tr>
								<th>名稱</th>
								<th>價格</th>
								<th></th>
							</tr>
						</thead>
						<tbody id="tableBody"></tbody>
					</table>
				</div>
			</div>
		</div>

		<!-- 底部導覽載入位置 -->
		<div id="bottomNav"></div>

		<div id="loadingMask">
			<div class="spinner"></div>
		</div>

		<!-- Formula Modal -->
		<div class="modal fade" id="addFormula" tabindex="-1">
			<div class="modal-dialog modal-lg">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" v-show="!editmode">新增配方</h5>
						<h5 class="modal-title" v-show="editmode">維護配方-{{ formula_name }}</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body">
						<!-- Tabs -->
						<ul class="nav nav-tabs mb-3" id="Tabs" role="tablist">
							<li class="nav-item" role="presentation">
								<button class="nav-link active" id="formula-tab" data-bs-toggle="tab"
									data-bs-target="#formula" type="button" role="tab">配方內容</button>
							</li>
							<li class="nav-item" role="presentation" v-if="editmode">
								<button class="nav-link" id="material-tab" data-bs-toggle="tab"
									data-bs-target="#material" type="button" role="tab">材料內容</button>
							</li>
							<li class="nav-item" role="presentation" v-if="editmode">
								<button class="nav-link" id="matcost-tab" data-bs-toggle="tab" data-bs-target="#matcost"
									type="button" role="tab">材料成本</button>
							</li>
						</ul>

						<!-- Tab Content -->
						<div class="tab-content" id="formulaTabsContent">
							<!-- 新增/維護配方 -->
							<div class="tab-pane fade show active" id="formula" role="tabpanel"
								aria-labelledby="formula-tab">
								<div class="p-4 bg-light rounded shadow-sm">
									<form @submit.prevent="editmode ? updateFormula() : createFormula()">
										<div class="form-group mb-3">
											<label class="col-sm-3 col-form-label">配方名稱</label>
											<input v-model="formula_name" type="text" name="formula_name"
												class="form-control col-sm-8" placeholder="請輸出配方名稱">
										</div>
										<button v-show="editmode" type="submit"
											class="btn btn-success w-100">修改</button>
										<button v-show="!editmode" type="submit"
											class="btn btn-primary w-100">新增</button>
									</form>
								</div>
							</div>
						</div>

						<!-- Tab Content -->
						<div v-show="editmode" class="tab-content" id="materialTabsContent">
							<!-- 材料內容 -->
							<div class="tab-pane fade" id="material" role="tabpanel" aria-labelledby="material-tab">
								<div class="p-4 bg-light rounded shadow-sm">
									<div class="form-group mb-3">
										<form @submit.prevent="addMaterial()">
											<div class="input-group mb-3" id="materialType">
												<label class="col-sm-3 col-form-label">材料名稱</label>
												<input v-model="material_name" type="text" name="material_name"
													class="form-control" placeholder="請輸入材料名稱及選擇材料類別">
												<button class="btn btn-outline-secondary dropdown-toggle" type="button"
													data-bs-toggle="dropdown" aria-expanded="false">{{ type_txt || '類別' }}</button>
												<ul class="dropdown-menu dropdown-menu-end">
													<li>
														<a class="dropdown-item" data-type="powder" @click.prevent="setCategory($event)" href="#">粉類原料</a>
													</li>
													<li>
														<a class="dropdown-item" data-type="grease" @click.prevent="setCategory($event)" href="#">油脂類</a>
													</li>
													<li>
														<a class="dropdown-item" data-type="sugar" @click.prevent="setCategory($event)" href="#">糖類</a>
													</li>
													<li>
														<a class="dropdown-item" data-type="dairy" @click.prevent="setCategory($event)" href="#">乳製品</a>
													</li>
													<li>
														<a class="dropdown-item" data-type="moistur" @click.prevent="setCategory($event)" href="#">濕性材料</a>
													</li>
													<li>
														<a class="dropdown-item" data-type="spices" @click.prevent="setCategory($event)" href="#">香料與裝飾</a>
													</li>
													<li><hr class="dropdown-divider"></li>
													<li>
														<a class="dropdown-item" data-type="meat" @click.prevent="setCategory($event)" href="#">肉類主料</a>
													</li>
													<li>
														<a class="dropdown-item" data-type="fillings" @click.prevent="setCategory($event)" href="#">蔬菜/餡料</a>
													</li>
													<li>
														<a class="dropdown-item" data-type="flavor" @click.prevent="setCategory($event)" href="#">辛香提味</a>
													</li>
													<li>
														<a class="dropdown-item" data-type="seasoning" @click.prevent="setCategory($event)" href="#">調味料</a>
													</li>
													<!-- <li><hr class="dropdown-divider"></li>
													<li><a class="dropdown-item" href="#">其他</a></li> -->
												</ul>
											</div>
											<button v-show="editmode" type="submit"
												class="btn btn-success w-100">新增</button>
										</form>
									</div>
									<div class="row g-2 seg-wrap mb-3">
										<div class="col-6">
											<button class="w-100 seg-btn btn btn-outline-primary"
											:class="{active: subTab === 'Bakings'}"
											@click="subTab = 'Bakings'">烘焙</button>
										</div>
										<div class="col-6">
											<button class="w-100 seg-btn btn btn-outline-primary"
											:class="{active: subTab === 'Dumplings'}"
											@click="subTab = 'Dumplings'">水餃</button>
										</div>
									</div>

									<div v-if="subTab === 'Bakings'" class="mb-3">
										<div class="form-group mb-3">
											<div v-for="(material, type) in baking_mat" :key="type">
												<label class="col-sm-3 col-form-label fw-bold">{{ mattype_name[type]
													}}</label>
												<div class="d-flex overflow-auto gap-2">
													<div class="badge-wrapper" v-for="data in material">
														<span class="badge rounded-pill"
															:class="data.active ? 'bg-danger':'bg-secondary'"
															@click="setMaterial(data)"
															style="font-size: 1rem;margin: 0.3rem;">
															{{ data.name }}
															<i v-if="data.is_basic=='Y'"class="fa-solid fa-xmark remove-icon" @click="removeMaterial(data)"></i>
														</span>
													</div>
												</div>
											</div>
										</div>
									</div>
									<div v-if="subTab === 'Dumplings'" class="mb-3">
										<div class="form-group mb-3">
											<div v-for="(material, type) in dumpling_mat" :key="type">
												<label class="col-sm-3 col-form-label fw-bold">{{ mattype_name[type]
													}}</label>
												<div class="d-flex overflow-auto gap-2">
													<div class="badge-wrapper" v-for="data in material">
														<span class="badge rounded-pill"
															:class="data.active ? 'bg-danger':'bg-secondary'"
															@click="setMaterial(data)"
															style="font-size: 1rem;margin: 0.3rem;">
															{{ data.name }}
															<i v-if="data.is_basic=='Y'" class="fa-solid fa-xmark remove-icon" @click="removeMaterial(data)"></i>
														</span>
													</div>
												</div>
											</div>
										</div>
									</div>
									<button v-show="editmode" type="button" class="btn btn-success w-100" @click="saveMaterial()">儲存</button>
								</div>
							</div>
						</div>

						<!-- Tab Content -->
						<div v-show="editmode" class="tab-content" id="matcostTabsContent">
							<!-- 材料成本 -->
							<div class="tab-pane fade" id="matcost" role="tabpanel" aria-labelledby="matcost-tab">
								<div class="p-4 bg-light rounded shadow-sm">
									<form @submit.prevent="addMaterialCost()">
										<div class="input-group mb-3" v-for="(material, type) in sel_material" :key="type">
											<label class="col-sm-3 col-form-label fw-bold">{{ material.name }}</label>
											<div class="d-flex overflow-auto gap-2">
												<input type="number" v-model="material.price" class="form-control" style="font-size: 1rem;margin: 0.3rem;">
											</div>
										</div>
										<button v-show="editmode" type="submit"	class="btn btn-success w-100">儲存</button>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
<script>
	const mask = document.getElementById('loadingMask');
</script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>

	var vm = new Vue({
		el: '#app',
		data: {
			editmode: false,
			msg: '',
			userId: 'test',
			subTab: 'Bakings',
			formula_id: '',
			formula_name: '',
			formulas: { data: [] },
			material_name: '',
			baking_mat: [],
			dumpling_mat: [],
			materials: {},
			mattype_name: [],
			sel_material: [],
			baking_basic: [],
			dumpling_basic: [],
			sel_type: '',
			type_txt: '',
		},
		methods: {

			addFormulaModal() {

				this.editmode = false;

				this.formula_name = '';

				$("#addFormula").modal('show');
			},

			updFormulaModal(e) {

				// console.log(e);

				this.editmode = true;

				$("#addFormula").modal('show');

				this.formula_id   = $(e).data('id');
				this.formula_name = $(e).data('name');
				this.sel_material = []; // 重置已選材料

				console.log(this.formula_name);
				console.log(this.sel_material);

				this.loadBakingMaterials();
				this.loadDumplingMaterials();
				this.loadCostMaterials();

			},

			checkImgModal() {

			},

			loadFormulas() {

				db.ref("users/" + this.userId + "/formulas").on("value", (snapshot) => {
					const raw = snapshot.val();

					let events = [];

					if (raw) {

						let parsed = JSON.parse(raw);
						// console.log(parsed);

						mask.style.display = 'flex';

						$('#example').DataTable({
							data: parsed.data,
							destroy: true, // 重新載入時清除舊表格
							responsive: true,      // 如果你有使用 Bootstrap 等 RWD 框架
							autoWidth: false,      // 關閉自動欄寬
							pageLength: 5,           // 一頁顯示 5 筆
							lengthChange: false,     // 不顯示筆數設定下拉選單
							searching: false,
							ordering: false, // 不啟用欄位排序
							language: {
								paginate: { previous: '‹', next: '›' },
								zeroRecords: '目前沒有資料',
								url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/zh-HANT.json'
							},
							initComplete: function () {
								mask.style.display = 'none';
							},
							columns: [
								{ data: 'name', className: 'truncate' },
								{
									data: 'total_price',
									className: 'text-center',
									createdCell: function (td, cellData) {
										if (cellData == 0) {
											$(td).addClass('text-danger').text(cellData);
										} else {
											$(td).addClass('text-success').text(cellData);
										}
									}
								},
								{
									data: null,
									defaultContent: '',
									className: 'text-center',
									render: function (data, type, row) {

										// var enable = `<a href="#" class="dropdown-item link-secondary text-decoration-none" data-type="enable" onclick="enableFormula(this)"><i class="fas fa-edit"></i> 啟用配方</a>`;
										var img = `<a href="#" class="dropdown-item link-warning text-decoration-none" data-type="img" data-id="${row.id}" onclick="vm.checkImgModal(this)"><i class="fas fa-image"></i> 查看配方</a>`;
										var edit = `<a href="#" class="dropdown-item link-success text-decoration-none edit_material" data-type="edit" data-id="${row.id}" data-name="${row.name}"><i class="fas fa-edit"></i> 編輯配方</a>`;
										var del = `<a href="#" class="dropdown-item link-danger text-decoration-none" data-type="delete" data-id="${row.id}" onclick="vm.delFormula(this)"><i class="far fa-trash-alt"></i> 刪除配方</a>`;
										// var view = `<a href="#" class="dropdown-item link-warning text-decoration-none" data-id="${row.ID}" data-name="${row.名稱}" data-flavor="${flavor}" data-type="view" onclick="updModal(this)"><i class="fas fa-eye"></i></a>`;
										// var upd = `<a href="#" class="dropdown-item link-purple text-decoration-none" data-id="${row.ID}" data-name="${row.名稱}" data-flavor="${flavor}" data-type="upd" onclick="updModal(this)"><i class="fas fa-list-alt"></i> 管理訂單</a>`;
										// <span class="badge bg-success">Beta</span>

										var html = `
			                                <div class="dropdown">
			                                    <a href="#" class="link-dark" role="button" data-bs-toggle="dropdown" aria-expanded="false">
			                                        <i class="fas fa-bars"></i>
			                                    </a>
			                                    <ul class="dropdown-menu dropdown-menu-end">
			                                        <li>${img}</li>
			                                        <li>${edit}</li>
			                                        <li>${del}</li>
			                                    </ul>
			                                </div>
			                            `;

										return html;
									}
								}
							]
						});
					}
				});
			},

			async loadMaterials(){

				this.material_name = '';
				this.baking_mat    = [];
				this.dumpling_mat  = [];

				var def  = db.ref('users/' + this.userId + '/materials');
				var data = await def.once("value");

				if (data.exists()) { this.materials = data.val(); }
				
			},

			async loadCustomMaterials(){

				var def  = db.ref('users/' + this.userId + '/matbasic');
				var data = await def.once("value");

				if (data.exists()) { 
					var matbasic = data.val();
					Object.keys(matbasic).forEach(key => {
						if( key=='baking' )  { this.baking_basic   = matbasic[key]; }
						if( key=='dumpling' ){ this.dumpling_basic = matbasic[key]; }
					});
				}
			},

			loadBakingMaterials() {

				var matarr = [];

				matarr['powder']  = ['高粉', '中粉', '低粉', '玉米粉', '酵母', '泡打粉', '小蘇打粉', '太白粉', '奶粉', '可可粉', '抹茶粉', '杏仁粉', '咖啡粉', '紅茶粉', '起司粉', '七味粉'];
				matarr['grease']  = ['奶油', '鮮奶油', '無水奶油', '發酵奶油', '沙拉油', '植物油'];
				matarr['sugar']   = ['糖', '砂糖', '黑糖', '冰糖', '二砂糖', '糖粉', '純糖粉'];
				matarr['dairy']   = ['鮮奶', '乳酪', '蛋', '蛋白', '蛋黃', '鹹蛋黃', '煉乳'];
				matarr['moistur'] = ['馬斯卡彭', '檸檬汁', '水', '冰水', '醬油', '蜂蜜', '榛果醬'];
				matarr['spices']  = ['鹽', '香草莢', '香草精', '巧克力豆', '夏威夷豆', '碎核桃', '蔓越莓乾', '葡萄乾', 'OREO碎塊', '杏仁片', '棉花糖', '吉利丁片', '蘭姆酒', '檸檬皮屑', '八角', '甘草', '黃耆', '黑芝麻', '白芝麻'];
				// matarr['other']   = ['其他'];

				this.mattype_name['powder']  = '粉類原料';
				this.mattype_name['grease']  = '油脂類';
				this.mattype_name['sugar']   = '糖類';
				this.mattype_name['dairy']   = '乳製品';
				this.mattype_name['moistur'] = '濕性材料';
				this.mattype_name['spices']  = '香料與裝飾';

				// console.log(this.materials);

				var tmpmats = {};
				for (let type in matarr) {
					tmpmats[type] = [];
					matarr[type].forEach(val => {
						
						var item = { name:val, active:false, category:type, weight:0, double:1, size:0, cost:0,price:0, unit:'' };
						if (Object.keys(this.materials).length > 0) {

							const prd_name = this.materials[this.formula_name];

							if (prd_name && prd_name[type]) {

								const types = prd_name[type];

								if (types[val]) {
									item.active = types[val].active;
									tmpmats[type].push(item);
									this.sel_material.push(item);
								} else {
									tmpmats[type].push(item);
								}
							} else {
								tmpmats[type].push(item);
							}
						} else {
							tmpmats[type].push(item);
						}
					});
				}

				// console.log(this.baking_mat);

				if (Object.keys(this.baking_basic).length > 0) {
					var tmpbasic = this.baking_basic;
					Object.keys(tmpbasic).forEach(type => {
						Object.keys(tmpbasic[type]).forEach(name => {
							var item = { name:name, active:false, category:type, weight:0, double:1, size:0, cost:0,price:0, unit:'', is_basic: 'Y', mattype: 'baking' };
							tmpmats[type].push(item);
						});
					});
				}
				this.baking_mat = tmpmats;
				// console.log(this.baking_mat);
			},

			loadDumplingMaterials(){

				var matarr = [];
				matarr['meat']      = ['豬肉'];
				matarr['fillings']  = ['高麗菜', '韭菜', '蝦仁', '玉米', '剝皮辣椒', '泡菜', '蔥'];
				matarr['flavor']    = ['蔥花', '薑末'];
				matarr['seasoning'] = ['鹽', '糖', '砂糖', '細砂糖', '醬油','白胡椒粉', '太白粉', '玉米粉', '味素', '香油', '蛋', '冰水'];
				// matarr['other']   = ['其他'];

				this.mattype_name['meat']      = '肉類主料';
				this.mattype_name['fillings']  = '蔬菜/餡料';
				this.mattype_name['flavor']    = '辛香提味';
				this.mattype_name['seasoning'] = '調味料';

				// console.log(this.materials);

				var tmpmats = {};
				for (let type in matarr) {
					tmpmats[type] = [];
					matarr[type].forEach(val => {
						var item = { name:val, active:false, category:type, weight:0, double:1, size:0, cost:0,price:0, unit:'' };
						if (Object.keys(this.materials).length > 0) {

							Object.keys(this.materials).forEach(key => {

			checkFormula() {

				var formula = this.formulas.data.filter(data => data.name === this.formula_name);

					const def = db.ref('users/' + this.userId + '/formulas');

					var nextId = this.formulas.data.reduce((maxId, item) => Math.max(maxId, item.id || 0), 0) + 1;

						name: this.formula_name,
						active: false,
						total_weight: 0,
						total_size: 0,
						total_price: 0,
						image: "",
						expire_date: "",
					}

					this.formulas.data.push(list);

			updateFormula() {

				var chkFormula = this.checkFormula();

					const def = db.ref('users/' + this.userId + '/formulas');

					var fid = this.formula_id;
					var new_name = this.formula_name;
					var formulas = this.formulas;

					formulas.data.forEach(function (val, i, arr) {
						if (val.id == fid) {
							arr[i].name = new_name;
						}
					});

					def.set(JSON.stringify(formulas));

					text: '此操作無法復原！',
					icon: 'warning',
					showCancelButton: true,
					confirmButtonText: '確定',
					cancelButtonText: '取消'
				}).then((result) => {
					if (result.isConfirmed) {

						const def = db.ref('users/' + this.userId + '/formulas');

						var formulas = this.formulas;

						formulas.data = formulas.data.filter(item => item.id !== Number(id));
