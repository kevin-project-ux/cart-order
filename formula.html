<script>

	var vm = new Vue({
		el: '#app',
		data: {
			editmode: false,
			msg: '',
			userId: 'test',
			formula_id: '',
			formula_name: '',
			formulas: { data: [] },
			material_name: '',
			materials: [],
			mattype_name:[],
			sel_material: [],
		},
		methods: {

			addFormulaModal(){

				this.editmode = false;

				this.formula_name = '';

				$("#addFormula").modal('show');
			},

			updFormulaModal(e){

				console.log(e);

				this.editmode = true;

				$("#addFormula").modal('show');

				this.formula_id   = e.dataset.id;
				this.formula_name = e.dataset.name;
			},

			checkImgModal(){

			},

			loadFormulas() {

				// var ym = this.getLastMonth();
				// ⬇ 取得 users/test/202503_schedules
				db.ref("users/" + this.userId + "/formulas").on("value", (snapshot) => {
					const raw = snapshot.val();

					let events = [];

					if (raw) {

						let parsed = JSON.parse(raw);
						console.log(parsed);

						mask.style.display = 'flex';

						$('#example').DataTable({
			                data: parsed.data,
			                destroy: true, // 重新載入時清除舊表格
			                responsive: true,      // 如果你有使用 Bootstrap 等 RWD 框架
			                autoWidth: false,      // 關閉自動欄寬
			                pageLength: 5,           // 一頁顯示 5 筆
			                lengthChange: false,     // 不顯示筆數設定下拉選單
			                searching: false,
			                ordering: false, // 不啟用欄位排序
			                language: {
			                    paginate: { previous: '‹', next: '›' },
			                    zeroRecords: '目前沒有資料',
			                    url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/zh-HANT.json'
			                },
			                initComplete: function () {
			                    mask.style.display = 'none';
			                },
			                columns: [
			                    { data: 'name', className: 'truncate' },
			                    { 
			                        data: 'total_price',
			                        className: 'text-center',
			                        createdCell: function (td, cellData) {
			                        	if( cellData==0 ){
			                        		$(td).addClass('text-danger').text(cellData);
			                        	}else{
			                        		$(td).addClass('text-success').text(cellData);
			                        	}
			                        }
			                    },
			                    {
			                        data: null,
			                        defaultContent: '',
			                        className: 'text-center',
			                        render: function (data, type, row) {

			                        	// var enable = `<a href="#" class="dropdown-item link-secondary text-decoration-none" data-type="enable" onclick="enableFormula(this)"><i class="fas fa-edit"></i> 啟用配方</a>`;
			                        	var img  = `<a href="#" class="dropdown-item link-warning text-decoration-none" data-type="img" data-id="${row.id}" onclick="vm.checkImgModal(this)"><i class="fas fa-image"></i> 查看配方</a>`;
			                            var edit = `<a href="#" class="dropdown-item link-success text-decoration-none" data-type="edit" data-id="${row.id}" data-name="${row.name}" onclick="vm.updFormulaModal(this)"><i class="fas fa-edit"></i> 編輯配方</a>`;
			                            var del  = `<a href="#" class="dropdown-item link-danger text-decoration-none" data-type="delete" data-id="${row.id}" onclick="vm.delFormula(this)"><i class="far fa-trash-alt"></i> 刪除配方</a>`;
			                            // var view = `<a href="#" class="dropdown-item link-warning text-decoration-none" data-id="${row.ID}" data-name="${row.名稱}" data-flavor="${flavor}" data-type="view" onclick="updModal(this)"><i class="fas fa-eye"></i></a>`;
			                            // var upd = `<a href="#" class="dropdown-item link-purple text-decoration-none" data-id="${row.ID}" data-name="${row.名稱}" data-flavor="${flavor}" data-type="upd" onclick="updModal(this)"><i class="fas fa-list-alt"></i> 管理訂單</a>`;
			                            // <span class="badge bg-success">Beta</span>

			                            var html = `
			                                <div class="dropdown">
			                                    <a href="#" class="link-dark" role="button" data-bs-toggle="dropdown" aria-expanded="false">
			                                        <i class="fas fa-bars"></i>
			                                    </a>
			                                    <ul class="dropdown-menu dropdown-menu-end">
			                                        <li>${img}</li>
			                                        <li>${edit}</li>
			                                        <li>${del}</li>
			                                    </ul>
			                                </div>
			                            `;

			                            return html;
			                        }
			                    }
			                ]
			            });
					}
				});
			},

			loadMaterials(){

				var matarr = [];
				matarr['powder']  = ['高粉','中粉','低粉','糖粉','純糖粉','玉米粉','太白粉','奶粉','可可粉','抹茶粉','杏仁粉','咖啡粉','紅茶粉','起司粉','七味粉'];
				matarr['grease']  = ['奶油','鮮奶油','無水奶油','發酵奶油','沙拉油','植物油','榛果醬'];
				matarr['sugar']   = ['糖','砂糖','黑糖','冰糖','二砂糖'];
				matarr['dairy']   = ['鮮奶','乳酪','蛋','蛋白','蛋黃','鹹蛋黃','馬斯卡彭','煉乳','檸檬汁','水','冰水','醬油','蜂蜜'];
				matarr['bulking'] = ['酵母','泡打粉','小蘇打粉'];
				matarr['spices']  = ['鹽','香草莢','香草精','巧克力豆','夏威夷豆','碎核桃','蔓越莓乾','葡萄乾','OREO碎塊','杏仁片','棉花糖','吉利丁片','蘭姆酒','檸檬皮屑','八角','甘草','黃耆','黑芝麻','白芝麻'];
				// matarr['other']   = ['其他'];

				this.mattype_name['powder']  = '粉類原料';
				this.mattype_name['grease']  = '油脂類';
				this.mattype_name['sugar']   = '糖類';
				this.mattype_name['dairy']   = '乳製品與濕性材料';
				this.mattype_name['bulking'] = '發酵類';
				this.mattype_name['spices']  = '香料與裝飾';

				var tmpmats = {};
				for( let type in matarr ){
					tmpmats[type] = [];
				  	matarr[type].forEach(val => {
				  		tmpmats[type].push({ name:val, active: false, category:type });
				  	});
				}
				this.materials = tmpmats;
				console.log(this.materials);
			},

			async getFirebaseData() {

				let formulas;

				const def = db.ref('users/' + this.userId + '/formulas');
				const data = await def.once("value");

				if (data.exists()) {
					formulas = JSON.parse(data.val());
					this.formulas = formulas;
				}
			},

			checkFormula(){

				var formula  = this.formulas.data.filter(data => data.name === this.formula_name);

				if ( formula.length>0 ) {
                    Swal.fire({ icon: 'error', title: '新增配方失敗，該配方已存在!!' });
                    return false;
                }

                return true;
			},

			createFormula(){

				var chkFormula = this.checkFormula();

				if ( chkFormula ) {

                    const def = db.ref('users/' + this.userId + '/formulas');

					var nextId = this.formulas.data.reduce((maxId, item) => Math.max(maxId, item.id || 0), 0) + 1;

					// {"data":[{"id":1,"name":"法國可可裸食燕麥","active":true,"total_weight":513,"total_size":513,"total_price":"92.04","image":"https://i.ibb.co/WvDKxsfB/8bb57377607e.png","expire_date":1745206769}]}

					var list = {
                        id: nextId,
                        name: this.formula_name,
                        active: false,
                        total_weight: 0,
                        total_size: 0,
                        total_price: 0,
                        image: "",
                        expire_date: "",
                    }

					this.formulas.data.push(list);
					def.set(JSON.stringify(this.formulas));

					Swal.fire({ icon: 'success', title: '新增成功', text: '請於配方列表中查看!' });

					$("#addFormula").modal('hide');
                }
			},

			updateFormula(){

				var chkFormula = this.checkFormula();

				if ( chkFormula ) {

                    const def = db.ref('users/' + this.userId + '/formulas');

                    var fid 	 = this.formula_id;
					var new_name = this.formula_name;
					var formulas = this.formulas;
					
					formulas.data.forEach(function (val, i, arr) {
						if (val.id == fid) {
							arr[i].name = new_name;
						}
					});

					def.set(JSON.stringify(formulas));

					Swal.fire({ icon: 'success', title: '更新成功', text: '請於配方列表中查看!' });

					$("#addFormula").modal('hide');
                }
			},

			delFormula(e){

				var id = e.dataset.id;

				Swal.fire({
		            title: text,
		            text: '此操作無法復原！',
		            icon: 'warning',
		            showCancelButton: true,
		            confirmButtonText: '確定',
		            cancelButtonText: '取消'
		        }).then((result) => {
		            if (result.isConfirmed) {

		                const def = db.ref('users/' + this.userId + '/formulas');

						var formulas = this.formulas;

						formulas.data = formulas.data.filter(item => item.id !== Number(id));

						def.set(JSON.stringify(formulas));
		            } else if (result.isDismissed) {
		                // 使用者按下「取消」或點旁邊關閉
		                console.log('使用者取消');
		            }
		        });
			},

			setMaterial(item){
				item.active = !item.active;

				if( item.active ){
					this.sel_material.push(item);
				}else{
					this.sel_material = this.sel_material.filter(m => m.name !== item.name);
				}
				console.log(this.sel_material);
			},
